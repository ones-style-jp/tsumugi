<svg viewBox="0 0 440 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo B: 織 (Weaving threads) -->
  <g transform="translate(50, 70)">
    <!-- Thread 1 (purple) -->
    <path d="M -36 -22 Q -18 -22 -8 -8 Q 0 0 8 8 Q 18 22 36 22"
          stroke="#5e3b6c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Thread 2 (gold) -->
    <path d="M -36 22 Q -18 22 -8 8 Q 0 0 8 -8 Q 18 -22 36 -22"
          stroke="#c9a961" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Crossing point -->
    <circle cx="0" cy="0" r="3.5" fill="#5e3b6c"/>
    <!-- Small accent dots at ends -->
    <circle cx="-36" cy="-22" r="2" fill="#5e3b6c"/>
    <circle cx="36" cy="22" r="2" fill="#5e3b6c"/>
    <circle cx="-36" cy="22" r="2" fill="#c9a961"/>
    <circle cx="36" cy="-22" r="2" fill="#c9a961"/>
  </g>

  <!-- Main: 紡ぎ -->
  <text x="115" y="62" font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif"
        font-size="48" fill="#5e3b6c" font-weight="500" letter-spacing="6">紡ぎ</text>

  <!-- Sub: Tsumugi -->
  <line x1="115" y1="82" x2="135" y2="82" stroke="#7551a3" stroke-width="1"/>
  <text x="142" y="88" font-family="'Noto Serif', Georgia, serif"
        font-size="20" fill="#7551a3" letter-spacing="5" font-style="italic">Tsumugi</text>
  <line x1="248" y1="82" x2="268" y2="82" stroke="#7551a3" stroke-width="1"/>

  <!-- Tagline -->
  <text x="115" y="115" font-family="'Hiragino Mincho ProN', 'Yu Mincho', serif"
        font-size="11" fill="#9b8bb0" letter-spacing="4">家族と現場をむすぶ、デイサービス管理</text>
</svg>
